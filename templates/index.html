<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finana - Market Volatility Forecast</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Finana</h1>
            <p class="subtitle">Next-Day Market Volatility Risk Dashboard</p>
        </header>

        <main>
            <!-- Market Selection and Search -->
            <section class="card market-controls">
                <h2>Select Market</h2>
                <div class="market-buttons" id="marketButtons">
                    <!-- Buttons will be dynamically loaded here by JS -->
                    <button class="market-btn active" data-market="SPX">S&P 500</button>
                    <button class="market-btn" data-market="NDX">NASDAQ</button>
                    <button class="market-btn" data-market="DJI">Dow Jones</button>
                    <button class="market-btn" data-market="DAX">DAX</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="marketSearch" placeholder="Search specific stock (e.g., AAPL)">
                    <span class="material-icons search-icon">search</span>
                </div>
            </section>

            <!-- Volatility Status Card -->
            <section class="card status-card" id="statusCard">
                <div class="card-header">
                    <h2 id="currentMarketDisplay">S&P 500</h2>
                    <div class="header-right">
                        <span class="live-pulse"></span>
                        <span id="currentDate" class="date-badge"></span>
                    </div>
                </div>

                <div class="indicator-container">
                    <div id="riskIndicator" class="risk-indicator low">
                        <strong id="volatilityStatus">NORMAL</strong>
                        <span>Expected Tomorrow</span>
                    </div>
                </div>

                <div class="metrics">
                    <div class="metric">
                        <span class="label">Next-Day Probability</span>
                        <span id="probability" class="value">--%</span>
                    </div>
                    <div class="metric">
                        <span class="label">Confidence Score</span>
                        <span id="confidence" class="value">--</span>
                    </div>
                </div>
            </section>

            <!-- Key Risk Headlines Card -->
            <section class="card headlines-card">
                <h2>Key Risk Headlines</h2>
                <ul id="headlineList" class="headline-list">
                    <li>Analyzing current market headlines...</li>
                </ul>
            </section>
        </main>

        <footer>
            <p>Finana Dashboard | Minimalist Market Risk Forecasting</p>
            <p><a href="https://github.com/aritra/finana" target="_blank">View on GitHub</a></p>
        </footer>
    </div>

    <script>
        const currentDateElement = document.getElementById('currentDate');
        const volatilityStatusElement = document.getElementById('volatilityStatus');
        const probabilityElement = document.getElementById('probability');
        const confidenceElement = document.getElementById('confidence');
        const riskIndicatorElement = document.getElementById('riskIndicator');
        const headlineListElement = document.getElementById('headlineList');
        const marketButtonsContainer = document.getElementById('marketButtons');
        const currentMarketDisplay = document.getElementById('currentMarketDisplay');
        const marketSearchInput = document.getElementById('marketSearch');

        let selectedMarket = 'SPX'; // Default selected market

        function updateDate() {
            currentDateElement.innerText = new Date().toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }

        async function fetchForecast(market = selectedMarket) {
            // Update the display for which market is currently being shown
            currentMarketDisplay.innerText = market === 'SPX' ? 'S&P 500' : market;
            // Placeholder for actual API call, will need to pass 'market' to backend
            const url = `/api/volatility?market=${market}`;

            try {
                // Reset UI state while fetching
                volatilityStatusElement.innerText = 'FETCHING...';
                riskIndicatorElement.className = 'risk-indicator';
                probabilityElement.innerText = '--%';
                confidenceElement.innerText = '--';
                headlineListElement.innerHTML = '<li>Updating headlines...</li>';

                const response = await fetch(url);
                const data = await response.json();

                if (data.status === 'success') {
                    const prob = data.next_day_prediction_prob;
                    const isHigh = data.next_day_prediction_class === 1;

                    probabilityElement.innerText = (prob * 100).toFixed(1) + '%';
                    confidenceElement.innerText = (Math.abs(prob - 0.5) * 2 * 10).toFixed(1) + '/10';

                    const statusText = isHigh ? 'HIGH RISK' : 'NORMAL';
                    volatilityStatusElement.innerText = statusText;
                    riskIndicatorElement.className = 'risk-indicator ' + (isHigh ? 'high' : 'low');

                    headlineListElement.innerHTML = '';
                    if (data.used_headlines && data.used_headlines.length > 0) {
                        data.used_headlines.forEach(headline => {
                            const li = document.createElement('li');
                            li.innerText = headline;
                            headlineListElement.appendChild(li);
                        });
                    } else {
                        headlineListElement.innerHTML = '<li>No specific headlines available for this market.</li>';
                    }
                } else {
                    volatilityStatusElement.innerText = 'ERROR';
                    riskIndicatorElement.className = 'risk-indicator'; // Neutral state
                    headlineListElement.innerHTML = `<li class="error">${data.message}</li>`;
                }
            } catch (error) {
                console.error('Error fetching prediction:', error);
                volatilityStatusElement.innerText = 'OFFLINE';
                riskIndicatorElement.className = 'risk-indicator'; // Neutral state
                headlineListElement.innerHTML = '<li class="error">Could not connect to the server.</li>';
            }
        }

        // Event Listeners
        marketButtonsContainer.addEventListener('click', (event) => {
            const target = event.target;
            if (target.classList.contains('market-btn')) {
                // Remove active class from all buttons
                document.querySelectorAll('.market-btn').forEach(btn => btn.classList.remove('active'));
                // Add active class to the clicked button
                target.classList.add('active');
                selectedMarket = target.dataset.market; // Update selected market
                fetchForecast(selectedMarket); // Fetch new forecast
            }
        });

        marketSearchInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                const searchTerm = marketSearchInput.value.trim().toUpperCase();
                if (searchTerm) {
                    // Deselect any active market button
                    document.querySelectorAll('.market-btn').forEach(btn => btn.classList.remove('active'));
                    selectedMarket = searchTerm;
                    fetchForecast(selectedMarket);
                }
            }
        });

        // Initial load
        updateDate();
        fetchForecast();
        // Update every 30 seconds
        setInterval(fetchForecast, 30000);
        setInterval(updateDate, 60000); // Update date less frequently
    </script>
</body>
</html>
